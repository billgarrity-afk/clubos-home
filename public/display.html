<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Home</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  background: #0F0D0B;
  font-family: 'DM Sans', sans-serif;
  color: #EDE6D3;
}

/* ── PHOTO ZONE ── */
.photo-zone {
  position: absolute;
  left: 0; top: 0;
  width: 1190px;
  height: 1080px;
  overflow: hidden;
}

.photo-bg {
  position: absolute;
  inset: 0;
  transition: opacity 2.5s ease;
}

.mood-portugal {
  background:
    radial-gradient(ellipse at 25% 65%, rgba(196,113,74,0.95) 0%, transparent 55%),
    radial-gradient(ellipse at 70% 30%, rgba(228,164,72,0.5) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 85%, rgba(100,40,10,0.8) 0%, transparent 50%),
    linear-gradient(160deg, #1A0C06 0%, #3D1A08 35%, #7A3A18 65%, #B86028 100%);
}
.mood-greece {
  background:
    radial-gradient(ellipse at 65% 35%, rgba(74,124,196,0.9) 0%, transparent 50%),
    radial-gradient(ellipse at 25% 70%, rgba(20,60,120,0.7) 0%, transparent 45%),
    radial-gradient(ellipse at 80% 75%, rgba(196,162,71,0.3) 0%, transparent 35%),
    linear-gradient(150deg, #080E1C 0%, #0E1E3C 30%, #1A3464 60%, #2A4A8C 100%);
}
.mood-family {
  background:
    radial-gradient(ellipse at 40% 55%, rgba(196,148,74,0.85) 0%, transparent 50%),
    radial-gradient(ellipse at 75% 25%, rgba(220,180,90,0.5) 0%, transparent 40%),
    radial-gradient(ellipse at 20% 80%, rgba(80,40,10,0.7) 0%, transparent 45%),
    linear-gradient(155deg, #120A04 0%, #2A1608 35%, #5A3015 65%, #966030 100%);
}
.mood-home {
  background:
    radial-gradient(ellipse at 45% 60%, rgba(74,120,74,0.85) 0%, transparent 50%),
    radial-gradient(ellipse at 75% 25%, rgba(100,160,80,0.4) 0%, transparent 40%),
    radial-gradient(ellipse at 20% 85%, rgba(20,50,20,0.8) 0%, transparent 45%),
    linear-gradient(150deg, #080E08 0%, #142014 35%, #244024 65%, #3A6A3A 100%);
}
.mood-memories {
  background:
    radial-gradient(ellipse at 35% 50%, rgba(160,120,138,0.85) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 30%, rgba(190,150,170,0.4) 0%, transparent 40%),
    radial-gradient(ellipse at 55% 80%, rgba(60,30,55,0.7) 0%, transparent 45%),
    linear-gradient(150deg, #0E080E 0%, #261626 35%, #4A2A44 65%, #7A4A68 100%);
}

/* Overlays */
.photo-vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 120% 100% at 40% 50%, transparent 25%, rgba(10,8,6,0.55) 100%);
}
.photo-right-fade {
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 45%, rgba(10,8,6,0.6) 75%, #0F0D0B 100%);
}
.photo-bottom-fade {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 55%, rgba(10,8,6,0.85) 100%);
}
.photo-grain {
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
  pointer-events: none; opacity: 0.5;
}

/* Mood label — top left */
.mood-label {
  position: absolute;
  top: 52px; left: 60px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.mood-pulse {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(196,162,71,0.7);
  animation: moodPulse 3s ease-in-out infinite;
}
@keyframes moodPulse {
  0%, 100% { opacity: 0.7; transform: scale(1); }
  50% { opacity: 0.3; transform: scale(0.6); }
}
.mood-name {
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(237,230,211,0.4);
  font-weight: 400;
}

/* Time — bottom left of photo */
.time-overlay {
  position: absolute;
  bottom: 100px;
  left: 60px;
}
.time-display {
  font-family: 'Cormorant Garamond', serif;
  font-size: 128px;
  font-weight: 300;
  color: #EDE6D3;
  line-height: 1;
  letter-spacing: -4px;
  text-shadow: 0 8px 60px rgba(0,0,0,0.7);
}
.date-display {
  font-size: 16px;
  font-weight: 300;
  color: rgba(237,230,211,0.55);
  letter-spacing: 3.5px;
  text-transform: uppercase;
  margin-top: 10px;
  text-shadow: 0 2px 20px rgba(0,0,0,0.8);
}

/* ── INFO PANEL ── */
.info-panel {
  position: absolute;
  right: 0; top: 0;
  width: 730px;
  height: 1080px;
  padding: 52px 60px 48px 52px;
  display: flex;
  flex-direction: column;
}

/* Greeting */
.greeting {
  margin-bottom: 36px;
  flex-shrink: 0;
}
.greeting-eyebrow {
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(196,162,71,0.5);
  margin-bottom: 8px;
  font-weight: 500;
}
.greeting-line {
  font-family: 'Cormorant Garamond', serif;
  font-size: 44px;
  font-weight: 300;
  color: #EDE6D3;
  line-height: 1.15;
}
.greeting-highlight { color: #C4A247; }

/* Separator */
.sep {
  height: 1px;
  background: linear-gradient(90deg, rgba(196,162,71,0.25), transparent);
  margin: 0 0 28px;
  flex-shrink: 0;
}

/* Weather */
.weather-block {
  display: flex;
  align-items: flex-start;
  gap: 20px;
  margin-bottom: 32px;
  flex-shrink: 0;
}
.weather-main {}
.weather-temp-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.weather-icon { font-size: 32px; line-height: 1; }
.weather-temp {
  font-family: 'Cormorant Garamond', serif;
  font-size: 68px;
  font-weight: 300;
  color: #EDE6D3;
  line-height: 1;
  letter-spacing: -1px;
}
.weather-meta {
  margin-top: 6px;
}
.weather-condition {
  font-size: 14px;
  color: rgba(237,230,211,0.55);
  letter-spacing: 0.5px;
}
.weather-note {
  font-size: 12px;
  color: rgba(196,162,71,0.6);
  margin-top: 3px;
  letter-spacing: 0.3px;
}

/* Section label */
.section-eyebrow {
  font-size: 9px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(196,162,71,0.45);
  margin-bottom: 14px;
  font-weight: 600;
  flex-shrink: 0;
}

/* Calendar */
.calendar-section {
  margin-bottom: 28px;
  flex-shrink: 0;
}

.cal-event {
  display: flex;
  align-items: baseline;
  gap: 0;
  padding: 9px 0;
  border-bottom: 1px solid rgba(237,230,211,0.05);
  position: relative;
}
.cal-event:last-child { border-bottom: none; }

.cal-time {
  font-size: 12px;
  color: rgba(237,230,211,0.38);
  min-width: 120px;
  font-weight: 300;
  flex-shrink: 0;
  letter-spacing: 0.3px;
}
.cal-title {
  font-size: 15px;
  color: rgba(237,230,211,0.85);
  font-weight: 400;
  flex: 1;
}
.cal-event.is-today .cal-time {
  color: rgba(196,162,71,0.8);
}
.cal-event.is-today .cal-title {
  color: #EDE6D3;
  font-weight: 500;
}
.cal-event.is-today::before {
  content: '';
  position: absolute;
  left: -16px;
  top: 50%;
  transform: translateY(-50%);
  width: 3px; height: 3px;
  border-radius: 50%;
  background: #C4A247;
}

/* Tasks */
.tasks-section {
  margin-bottom: 28px;
  flex-shrink: 0;
}
.task-buckets {
  display: flex;
  gap: 12px;
}
.task-bucket {
  flex: 1;
  background: rgba(196,162,71,0.05);
  border: 1px solid rgba(196,162,71,0.12);
  border-radius: 10px;
  padding: 16px 14px;
  text-align: center;
  transition: border-color 0.3s;
}
.bucket-count {
  font-family: 'Cormorant Garamond', serif;
  font-size: 46px;
  font-weight: 300;
  color: #C4A247;
  line-height: 1;
}
.bucket-label {
  font-size: 10px;
  color: rgba(237,230,211,0.38);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 6px;
  font-weight: 500;
}

/* QR Block */
.qr-block {
  margin-top: auto;
  display: flex;
  align-items: center;
  gap: 20px;
  padding-top: 20px;
  border-top: 1px solid rgba(196,162,71,0.1);
  flex-shrink: 0;
}
#qrCanvas {
  border-radius: 6px;
  flex-shrink: 0;
  background: rgba(237,230,211,0.08);
  border: 1px solid rgba(196,162,71,0.15);
}
.qr-text {}
.qr-cta {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  color: rgba(196,162,71,0.85);
  font-weight: 400;
  margin-bottom: 4px;
}
.qr-sub {
  font-size: 12px;
  color: rgba(237,230,211,0.35);
  line-height: 1.5;
  letter-spacing: 0.3px;
}

/* ── DISCOVERY BAR ── */
.discovery-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 0;
  background: rgba(10,8,6,0.97);
  border-top: 1px solid rgba(196,162,71,0.12);
  overflow: hidden;
  transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  align-items: center;
  padding: 0 60px;
  gap: 40px;
}
.discovery-bar.visible {
  height: 108px;
}

/* Speaking indicator */
.speaking-indicator {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.3s;
}
.speaking-indicator.active { opacity: 1; }
.speak-bar {
  width: 3px;
  border-radius: 2px;
  background: var(--gold);
  animation: speakBounce 0.8s ease-in-out infinite;
}
.speak-bar:nth-child(1) { height: 8px;  animation-delay: 0s;    }
.speak-bar:nth-child(2) { height: 16px; animation-delay: 0.1s;  }
.speak-bar:nth-child(3) { height: 22px; animation-delay: 0.2s;  }
.speak-bar:nth-child(4) { height: 14px; animation-delay: 0.3s;  }
.speak-bar:nth-child(5) { height: 8px;  animation-delay: 0.15s; }
@keyframes speakBounce {
  0%, 100% { transform: scaleY(0.4); opacity: 0.4; }
  50%       { transform: scaleY(1);   opacity: 1;   }
}

.discovery-left {
  flex-shrink: 0;
  min-width: 260px;
}
.discovery-label {
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(196,162,71,0.4);
  margin-bottom: 6px;
}
.discovery-q {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  color: rgba(196,162,71,0.75);
  font-style: italic;
  line-height: 1.3;
}

.discovery-divider {
  width: 1px;
  height: 60px;
  background: rgba(196,162,71,0.15);
  flex-shrink: 0;
}

.discovery-answer {
  flex: 1;
  font-size: 17px;
  color: rgba(237,230,211,0.85);
  line-height: 1.55;
}

/* ── ENTRANCE ANIMATIONS ── */
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(24px); }
  to { opacity: 1; transform: translateX(0); }
}

.photo-zone { animation: fadeIn 2s ease both; }
.greeting { animation: slideInRight 0.8s ease 0.15s both; }
.sep { animation: slideInRight 0.8s ease 0.25s both; }
.weather-block { animation: slideInRight 0.8s ease 0.3s both; }
.calendar-section { animation: slideInRight 0.8s ease 0.4s both; }
.tasks-section { animation: slideInRight 0.8s ease 0.5s both; }
.qr-block { animation: slideInRight 0.8s ease 0.6s both; }
</style>
</head>
<body>

<!-- PHOTO ZONE -->
<div class="photo-zone">
  <div class="photo-bg mood-portugal" id="photoBg"></div>
  <div class="photo-vignette"></div>
  <div class="photo-right-fade"></div>
  <div class="photo-bottom-fade"></div>
  <div class="photo-grain"></div>

  <div class="mood-label">
    <div class="mood-pulse"></div>
    <div class="mood-name" id="moodName">Portugal 2023</div>
  </div>

  <div class="time-overlay">
    <div class="time-display" id="timeDisplay">7:48 PM</div>
    <div class="date-display" id="dateDisplay">Tuesday, April 14</div>
  </div>
</div>

<!-- INFO PANEL -->
<div class="info-panel">

  <div class="greeting">
    <div class="greeting-eyebrow" id="greetingEyebrow">Good evening</div>
    <div class="greeting-line">The <span class="greeting-highlight" id="familyName">Garrity</span> Family</div>
  </div>

  <div class="sep"></div>

  <div class="weather-block">
    <div class="weather-main">
      <div class="weather-temp-row">
        <span class="weather-icon" id="wIcon">⛅</span>
        <span class="weather-temp" id="wTemp">68°F</span>
      </div>
      <div class="weather-meta">
        <div class="weather-condition" id="wCondition">Partly Cloudy · Durham, NC</div>
        <div class="weather-note" id="wNote">Rain expected Thursday</div>
      </div>
    </div>
  </div>

  <div class="calendar-section">
    <div class="section-eyebrow">Upcoming</div>
    <div id="calEvents"></div>
  </div>

  <div class="sep" style="margin-bottom:24px;"></div>

  <div class="tasks-section">
    <div class="section-eyebrow">Open Tasks</div>
    <div class="task-buckets">
      <div class="task-bucket">
        <div class="bucket-count" id="buyCount">4</div>
        <div class="bucket-label">Buy It</div>
      </div>
      <div class="task-bucket">
        <div class="bucket-count" id="doCount">8</div>
        <div class="bucket-label">Do It</div>
      </div>
      <div class="task-bucket">
        <div class="bucket-count" id="hireCount">3</div>
        <div class="bucket-label">Hire It</div>
      </div>
    </div>
  </div>

  <div class="qr-block">
    <canvas id="qrCanvas" width="72" height="72"></canvas>
    <div class="qr-text">
      <div class="qr-cta">Scan to interact</div>
      <div class="qr-sub">Ask anything · Change mood<br>Manage tasks · Shopping lists</div>
    </div>
  </div>

</div>

<!-- DISCOVERY BAR -->
<div class="discovery-bar" id="discoveryBar">
  <div class="discovery-left">
    <div class="discovery-label">You asked</div>
    <div class="discovery-q" id="discoveryQ"></div>
  </div>
  <div class="discovery-divider"></div>
  <div class="discovery-answer" id="discoveryA"></div>
  <div class="speaking-indicator" id="speakingIndicator">
    <div class="speak-bar"></div>
    <div class="speak-bar"></div>
    <div class="speak-bar"></div>
    <div class="speak-bar"></div>
    <div class="speak-bar"></div>
  </div>
</div>

<!-- QR Code generator -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
// ═══════════════════════════════════
// CONFIG — edit this block
// ═══════════════════════════════════
const HOME = {
  familyName: 'Garrity',
  phoneURL: 'https://clubos-home.vercel.app/phone.html', // update after deploy
  weather: {
    icon: '⛅',
    temp: '68°F',
    condition: 'Partly Cloudy · Durham, NC',
    note: 'Rain expected Thursday'
  },
  calendar: [
    { time: 'Today  4:00 PM', title: 'Pick up Payton',            today: true  },
    { time: 'Today  7:00 PM', title: 'Dinner — Tasu?',            today: true  },
    { time: 'Wed  Apr 16',    title: 'Jodi — GP call',            today: false },
    { time: 'Fri   Apr 18',   title: 'Payton graduation meeting', today: false },
    { time: 'Sat   Apr 19',   title: 'Ballantyne 4th of July preview', today: false }
  ],
  moods: [
    { key: 'portugal',  label: 'Portugal 2023',   cls: 'mood-portugal'  },
    { key: 'greece',    label: 'Greece 2022',      cls: 'mood-greece'    },
    { key: 'family',    label: 'Family Memories',  cls: 'mood-family'    },
    { key: 'home',      label: 'Home',             cls: 'mood-home'      },
    { key: 'memories',  label: "Mom's Photos",     cls: 'mood-memories'  }
  ]
};

// ── CLOCK ───────────────────────────
function updateClock() {
  const now = new Date();
  const h = now.getHours();
  const time = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  const date = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  document.getElementById('timeDisplay').textContent = time;
  document.getElementById('dateDisplay').textContent = date;
  const period = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('greetingEyebrow').textContent = period;
}

// ── WEATHER ─────────────────────────
function renderWeather() {
  document.getElementById('wIcon').textContent = HOME.weather.icon;
  document.getElementById('wTemp').textContent  = HOME.weather.temp;
  document.getElementById('wCondition').textContent = HOME.weather.condition;
  document.getElementById('wNote').textContent  = HOME.weather.note;
}

// ── CALENDAR ────────────────────────
function renderCalendar() {
  document.getElementById('familyName').textContent = HOME.familyName;
  document.getElementById('calEvents').innerHTML = HOME.calendar.map(e => `
    <div class="cal-event ${e.today ? 'is-today' : ''}">
      <div class="cal-time">${e.time}</div>
      <div class="cal-title">${e.title}</div>
    </div>
  `).join('');
}

// ── TASKS ────────────────────────────
function renderTasks() {
  const saved = JSON.parse(localStorage.getItem('home_task_counts') || 'null');
  if (saved) {
    document.getElementById('buyCount').textContent  = saved.buy;
    document.getElementById('doCount').textContent   = saved.doIt;
    document.getElementById('hireCount').textContent = saved.hireOut;
  }
}

// ── MOOD ─────────────────────────────
function updateMood() {
  const key    = localStorage.getItem('home_mood') || 'portugal';
  const mood   = HOME.moods.find(m => m.key === key) || HOME.moods[0];
  const bg     = document.getElementById('photoBg');
  // Only update class if it changed
  if (!bg.classList.contains(mood.cls)) {
    bg.style.opacity = '0';
    setTimeout(() => {
      bg.className = 'photo-bg ' + mood.cls;
      bg.style.opacity = '1';
    }, 400);
  }
  document.getElementById('moodName').textContent = mood.label;
}

// ── VOICE OUTPUT (Speech Synthesis) ───────────────
// Current engine: Web Speech Synthesis API (browser native)
// Upgrade path: swap VOICE_CONFIG.engine to 'anthropic'
//               when Anthropic Voice API launches —
//               replace speakText() with Anthropic TTS stream
// ────────────────────────────────────────────────
const VOICE_CONFIG = {
  engine:  'browser',  // 'browser' | 'anthropic' (coming soon)
  rate:    0.92,       // slightly slower = warmer feel
  pitch:   1.0,
  volume:  1.0,
  enabled: true        // set false to mute TV voice output
};

let voicePrimed = false;
let selectedVoice = null;

function primeVoice() {
  if (voicePrimed || !window.speechSynthesis) return;
  // Silent utterance — unlocks audio context after page load
  const u = new SpeechSynthesisUtterance('');
  u.volume = 0;
  window.speechSynthesis.speak(u);
  voicePrimed = true;
}

function loadVoice() {
  if (!window.speechSynthesis) return;
  const voices = speechSynthesis.getVoices();
  // Prefer warm natural-sounding English voices
  const preferred = [
    'Samantha', 'Karen', 'Moira', 'Tessa', // macOS / iOS
    'Google US English', 'Microsoft Aria',
    'en-US', 'en-GB'
  ];
  for (const pref of preferred) {
    const v = voices.find(v => v.name.includes(pref) || v.lang === pref);
    if (v) { selectedVoice = v; break; }
  }
  if (!selectedVoice) selectedVoice = voices.find(v => v.lang.startsWith('en')) || voices[0];
}

function speakText(text) {
  if (!VOICE_CONFIG.enabled || !window.speechSynthesis) return;
  speechSynthesis.cancel();

  const u = new SpeechSynthesisUtterance(text);
  u.rate   = VOICE_CONFIG.rate;
  u.pitch  = VOICE_CONFIG.pitch;
  u.volume = VOICE_CONFIG.volume;
  if (selectedVoice) u.voice = selectedVoice;

  const indicator = document.getElementById('speakingIndicator');

  u.onstart = () => indicator && indicator.classList.add('active');
  u.onend   = () => indicator && indicator.classList.remove('active');
  u.onerror = () => indicator && indicator.classList.remove('active');

  speechSynthesis.speak(u);
}

// Load voices (async on some browsers)
if (window.speechSynthesis) {
  loadVoice();
  speechSynthesis.onvoiceschanged = loadVoice;
}

// Prime on first user interaction
document.addEventListener('click', primeVoice, { once: true });
document.addEventListener('touchstart', primeVoice, { once: true });
// Auto-prime after short delay as fallback
setTimeout(primeVoice, 1500);

// ── DISCOVERY ────────────────────────
let lastDiscoveryTs = null;
let discoveryTimer  = null;

function pollDiscovery() {
  const ts = localStorage.getItem('home_discovery_ts');
  if (ts && ts !== lastDiscoveryTs) {
    lastDiscoveryTs = ts;
    const q = localStorage.getItem('home_discovery_q');
    const a = localStorage.getItem('home_discovery_a');
    if (q && a) showDiscovery(q, a);
  }
}

function showDiscovery(q, a) {
  document.getElementById('discoveryQ').textContent = q;
  document.getElementById('discoveryA').textContent = a;
  document.getElementById('discoveryBar').classList.add('visible');

  // Speak the answer aloud through the TV
  speakText(a);

  clearTimeout(discoveryTimer);
  discoveryTimer = setTimeout(() => {
    document.getElementById('discoveryBar').classList.remove('visible');
    speechSynthesis && speechSynthesis.cancel();
  }, 28000);
}

// ── QR CODE ──────────────────────────
function renderQR() {
  const url = encodeURIComponent(HOME.phoneURL);
  const img = document.createElement('img');
  img.src = `https://api.qrserver.com/v1/create-qr-code/?size=72x72&bgcolor=0F0D0B&color=EDE6D3&data=${url}`;
  img.style.cssText = 'width:72px;height:72px;border-radius:6px;border:1px solid rgba(196,162,71,0.15)';
  img.alt = 'QR Code';
  const canvas = document.getElementById('qrCanvas');
  canvas.parentNode.replaceChild(img, canvas);
}

// ── INIT ─────────────────────────────
function init() {
  renderWeather();
  renderCalendar();
  renderTasks();
  updateMood();
  updateClock();
  renderQR();

  setInterval(updateClock,    1000);
  setInterval(updateMood,     4000);
  setInterval(pollDiscovery,  2500);
  setInterval(renderTasks,    8000);
}

init();
</script>
</body>
